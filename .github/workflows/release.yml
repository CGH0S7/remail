name: release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: remail

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - name: Restore keystore
        shell: bash
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/remail-release.jks"
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=$GITHUB_WORKSPACE/remail-release.jks
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Check keystore file
        run: |
          ls -l "$GITHUB_WORKSPACE/remail-release.jks"
          file "$GITHUB_WORKSPACE/remail-release.jks"

      - name: Verify keystore
        run: |
          keytool -list -keystore "$GITHUB_WORKSPACE/remail-release.jks" -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APKs
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          flutter build apk --release --split-per-abi \
            --obfuscate --split-debug-info=build/app/outputs/symbols \
            --no-tree-shake-icons \
            --extra-gen-snapshot-options=--deterministic

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
